<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase crud</title>
  </head>
  <body>
    <form id="join" name="join-form">
      <h1>회원가입</h1>
      <input
        type="email"
        id="userEmail"
        placeholder="123@gmail.com"
        name="auth-email"
      />
      <input
        type="password"
        id="userPw"
        name="auth-password"
        placeholder="6자리 이상 비밀번호 입력"
      />
      <button type="submit">가입</button>
    </form>
  </body>
</html>
